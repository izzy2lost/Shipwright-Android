name: Android APK Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      NDK_VERSION: "27.2.12479018"
      ANDROID_SDK_ROOT: /home/runner/Android/Sdk

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v2

    - name: Install Ninja
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build

    - name: Download CMake 3.25.1
      run: |
        mkdir -p $ANDROID_SDK_ROOT/cmake
        wget https://github.com/Kitware/CMake/releases/download/v3.25.1/cmake-3.25.1-linux-x86_64.tar.gz
        tar -xzf cmake-3.25.1-linux-x86_64.tar.gz
        mv cmake-3.25.1-linux-x86_64 $ANDROID_SDK_ROOT/cmake/3.25.1

    - name: Verify CMake installation
      run: ls -l $ANDROID_SDK_ROOT/cmake

    - name: Download NDK
      run: |
        sdkmanager --install "ndk;$NDK_VERSION" --sdk_root=$ANDROID_SDK_ROOT

    - name: Set up local.properties
      run: |
        echo "sdk.dir=/home/runner/Android/Sdk" > local.properties
        echo "ndk.dir=/home/runner/Android/Sdk/ndk/$NDK_VERSION" >> local.properties
        echo "cmake.dir=/home/runner/Android/Sdk/cmake/3.25.1" >> local.properties

    - name: Build APK
      run: |
        ./gradlew assembleRelease --stacktrace -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true -Pcmake.buildType=Release -Pcmake.cmakeCommand=ninja

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release.apk
        path: app/build/outputs/apk/release/app-release.apk
