name: Android APK Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      NDK_VERSION: "26.3.11579264"
      CMAKE_VERSION: "3.25.1"
      ANDROID_SDK_ROOT: /home/runner/Android/Sdk

    steps:
    - name: Checkout with submodules
      uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v2

    - name: Install Android SDK Components
      run: |
        yes | sdkmanager --licenses --sdk_root=$ANDROID_SDK_ROOT
        sdkmanager --install "cmdline-tools;latest" "platform-tools" "platforms;android-33" "build-tools;33.0.0" "cmake;3.25.1" "ndk;$NDK_VERSION"

    - name: Configure local.properties
      run: |
        echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
        echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/$NDK_VERSION" >> local.properties
        echo "cmake.dir=$ANDROID_SDK_ROOT/cmake/$CMAKE_VERSION" >> local.properties

    - name: Build APK
      run: ./gradlew assembleRelease --stacktrace
