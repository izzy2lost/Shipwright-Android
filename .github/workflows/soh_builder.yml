name: Android APK Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      NDK_VERSION: "26.3.11579264"
      ANDROID_SDK_ROOT: /home/runner/Android/Sdk

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v2

    - name: Install Android Studio Components
      run: |
        yes | sdkmanager --install "cmdline-tools;latest" "platform-tools" "platforms;android-33" "build-tools;33.0.0" "cmake;3.22.1" "ndk;$NDK_VERSION" --sdk_root=$ANDROID_SDK_ROOT

    - name: Verify Installation
      run: |
        sdkmanager --list --sdk_root=$ANDROID_SDK_ROOT

    - name: Set up local.properties
      run: |
        echo "sdk.dir=/home/runner/Android/Sdk" > local.properties
        echo "ndk.dir=/home/runner/Android/Sdk/ndk/$NDK_VERSION" >> local.properties
        echo "cmake.dir=/home/runner/Android/Sdk/cmake/3.22.1" >> local.properties

    - name: Build APK
      run: |
        ./gradlew assembleRelease --stacktrace -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true -Pcmake.buildType=Release -Pcmake.cmakeCommand=ninja

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release.apk
        path: app/build/outputs/apk/release/app-release.apk
