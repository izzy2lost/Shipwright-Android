name: Android APK Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      NDK_VERSION: "27.2.12479018"
      ANDROID_SDK_ROOT: /home/runner/Android/Sdk

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v2

    - name: List available CMake versions
      run: sdkmanager --list | grep "cmake;"

    - name: Install CMake
      run: |
        sdkmanager --install "cmake;3.22.1" --sdk_root=$ANDROID_SDK_ROOT

    - name: Download NDK
      run: |
        sdkmanager --install "ndk;$NDK_VERSION" --sdk_root=$ANDROID_SDK_ROOT

    - name: Set up local.properties
      run: |
        echo "sdk.dir=/home/runner/Android/Sdk" > local.properties
        echo "ndk.dir=/home/runner/Android/Sdk/ndk/$NDK_VERSION" >> local.properties
        echo "cmake.dir=/home/runner/Android/Sdk/cmake/3.22.1" >> local.properties

    - name: Build APK
      run: ./gradlew assembleRelease --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: app-release.apk
        path: app/build/outputs/apk/release/app-release.apk
